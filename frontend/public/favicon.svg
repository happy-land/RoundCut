<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3a8a;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="256" height="256" fill="url(#bgGrad)"/>
  
  <g transform="translate(128, 128)">
    
    <!-- Round steel billet (circle) -->
    <circle cx="0" cy="-15" r="40" fill="#64748b" stroke="#475569" stroke-width="2" filter="url(#shadow)"/>
    
    <!-- Inner shadow for depth -->
    <circle cx="0" cy="-15" r="40" fill="none" stroke="#94a3b8" stroke-width="1" opacity="0.4" stroke-dasharray="5,5"/>
    
    <!-- Center point of circle -->
    <circle cx="0" cy="-15" r="4" fill="#1e293b"/>
    
    <!-- Cutting disc (circular saw) -->
    <g filter="url(#shadow)">
      <!-- Disc body -->
      <circle cx="0" cy="25" r="32" fill="#ef4444" stroke="#dc2626" stroke-width="2"/>
      
      <!-- Disc teeth/segments -->
      <line x1="-28" y1="25" x2="-32" y2="25" stroke="#fca5a5" stroke-width="2"/>
      <line x1="28" y1="25" x2="32" y2="25" stroke="#fca5a5" stroke-width="2"/>
      <line x1="0" y1="-5" x2="0" y2="-9" stroke="#fca5a5" stroke-width="2"/>
      <line x1="0" y1="55" x2="0" y2="59" stroke="#fca5a5" stroke-width="2"/>
      <line x1="20" y1="8" x2="24" y2="4" stroke="#fca5a5" stroke-width="2"/>
      <line x1="-20" y1="8" x2="-24" y2="4" stroke="#fca5a5" stroke-width="2"/>
      <line x1="20" y1="42" x2="24" y2="46" stroke="#fca5a5" stroke-width="2"/>
      <line x1="-20" y1="42" x2="-24" y2="46" stroke="#fca5a5" stroke-width="2"/>
      
      <!-- Center hole -->
      <circle cx="0" cy="25" r="6" fill="#1e293b" stroke="#1e293b" stroke-width="1"/>
    </g>
    
    <!-- Cutting action line -->
    <line x1="0" y1="-12" x2="0" y2="20" stroke="#fbbf24" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
    
    <!-- Sparks -->
    <circle cx="20" cy="5" r="2.5" fill="#fbbf24" opacity="0.7"/>
    <circle cx="-20" cy="5" r="2.5" fill="#fbbf24" opacity="0.7"/>
    <circle cx="25" cy="15" r="1.5" fill="#f59e0b" opacity="0.8"/>
    <circle cx="-25" cy="15" r="1.5" fill="#f59e0b" opacity="0.8"/>
    <circle cx="22" cy="-5" r="2" fill="#fbbf24" opacity="0.6"/>
    <circle cx="-22" cy="-5" r="2" fill="#fbbf24" opacity="0.6"/>
    
    <!-- Arrow showing direction -->
    <g opacity="0.8">
      <path d="M 45 -15 L 55 -15 L 52 -12 M 55 -15 L 52 -18" stroke="#60a5fa" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    
  </g>
</svg>